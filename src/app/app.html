<div class="app-container">
  <div class="container">
    <div class="header">
      <h1>English</h1>
      <div class="stats-inline">
        <span class="stat-badge correct">{{ correctCount }}</span>
        <span class="stat-badge wrong">{{ wrongCount }}</span>
      </div>
    </div>
    
    <div class="word-container">
      <div class="word">{{ currentWord }}</div>
    </div>
    
    <div class="input-container">
      <input 
        type="text" 
        [(ngModel)]="userAnswer"
        (keypress)="onKeyPress($event)"
        [class.correct]="feedbackType === 'correct'"
        [class.wrong]="feedbackType === 'wrong'"
        placeholder="Translation..."
        autocomplete="off"
        autofocus
      >
      
      <div 
        class="feedback"
        [class.show]="feedback"
        [class.correct]="feedbackType === 'correct'"
        [class.wrong]="feedbackType === 'wrong'"
      >
        {{ feedback }}
      </div>
    </div>
  </div>
</div>
